function bindModal(){
  const mo=g('mo');if(mo)mo.addEventListener('click',e=>{if(e.target===mo){S.modal=null;render()}});
  const mc=g('mc');if(mc)mc.addEventListener('click',()=>{S.modal=null;render()});

  const ss=g('ss');if(ss)ss.addEventListener('click',async()=>{
    const sid=S.modal.storeId,pid=S.modal.productId,nq=parseInt(gv('m-qty'));
    const newQty=isNaN(nq)?0:nq;
    const oldQty=qty(sid,pid);
    S.modal=null;render();
    try{
      const ex=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
      if(ex&&ex.length){await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})})}
      else{await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})})}
      S.stock[sid+'-'+pid]=newQty;
      // Log stock history
      const[sh]=await api('stock_history',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,account_id:S.session?.id,old_quantity:oldQty,new_quantity:newQty})});
      if(sh)(S.stockHistory=S.stockHistory||[]).unshift(sh);
      showToast('✓ '+t().saved);render();
    }catch(e){showToast('❌ '+t().errSave,'err')}
  });

  // Save orderable product
  const sop=g('sop');if(sop)sop.addEventListener('click',async()=>{
    const isEdit=S.modal.type==='edit-op';
    const name=document.getElementById('op-name')?.value;
    if(!name){showToast('Naam is verplicht','err');return;}
    const payload={
      name, artikel_id:document.getElementById('op-artid')?.value||null,
      category:document.getElementById('op-cat')?.value,
      unit:document.getElementById('op-unit')?.value,
      default_qty:parseInt(document.getElementById('op-dqty')?.value)||1,
      min_stock:parseInt(document.getElementById('op-min')?.value)||0,
      supplier:document.getElementById('op-sup')?.value||null,
      for_type:document.getElementById('op-fortype')?.value||'winkel',
      active:document.getElementById('op-fortype')?.value==='magazijn'?false:(document.getElementById('op-active')?.value==='true')
    };
    try{
      if(isEdit){
        await api(`orderable_products?id=eq.${S.modal.op.id}`,{method:'PATCH',body:JSON.stringify(payload)});
        const idx=(S.orderableProducts||[]).findIndex(x=>x.id===S.modal.op.id);
        if(idx>-1)S.orderableProducts[idx]={...S.orderableProducts[idx],...payload};
      }else{
        const[np]=await api('orderable_products',{method:'POST',body:JSON.stringify({...payload,sort_order:((S.orderableProducts||[]).length+1)*10})});
        if(np)(S.orderableProducts=S.orderableProducts||[]).push(np);
      }
      S.modal=null;showToast('✓ Opgeslagen');render();
    }catch(e){showToast('❌ Fout bij opslaan','err');}
  });

  // Save supplier
  const ssup=g('ssup');if(ssup)ssup.addEventListener('click',async()=>{
    const name=document.getElementById('sup-name')?.value;
    if(!name){showToast('Naam is verplicht','err');return;}
    const payload={
      name,
      category:document.getElementById('sup-cat')?.value||null,
      contact_person:document.getElementById('sup-contact')?.value||null,
      email:document.getElementById('sup-email')?.value||null,
      order_method:document.getElementById('sup-method')?.value||null,
      notes:document.getElementById('sup-notes')?.value||null,
      company_id:S.company?.id||1
    };
    try{
      const[ns]=await api('suppliers',{method:'POST',body:JSON.stringify(payload)});
      if(ns)(S.suppliers=S.suppliers||[]).push(ns);
      S.modal=null;showToast('✓ Leverancier toegevoegd');render();
    }catch(e){showToast('❌ Fout bij opslaan','err');}
  });

  const sorder=g('sorder');if(sorder)sorder.addEventListener('click',async()=>{
    const isEdit=S.modal.type==='edit-order';
    const sid=parseInt(g('m-store').value);
    const note=gv('m-note');
    const priceCardsNote=gv('price-cards-note');
    // Build rows from orderQtys
    const qtys=S.modal.orderQtys||{};
    const isStoreRole=S.session.role==='store';
    const isAdminOrMgr=S.session.role==='admin'||S.session.role==='manager';
    const rows=Object.entries(qtys)
      .filter(([pid,qty])=>qty>0)
      .map(([pid,qty])=>{
        const pid_int=parseInt(pid);
        if(isAdminOrMgr){
          // Admin uses S.products - pid is product.id directly
          const prod=S.products.find(p=>p.id===pid_int);
          return{
            product_id:pid_int,
            orderable_product_id:null,
            quantity:qty,
            product_name:prod?.name||''
          };
        }else{
          // Store uses orderableProducts - pid is orderable_product.id
          const oprod=(S.orderableProducts||[]).find(p=>p.id===pid_int);
          return{
            orderable_product_id:pid_int,
            product_id:null,
            quantity:1,
            product_name:oprod?.name||''
          };
        }
      });
    if(!rows.length){showToast('Voeg minimaal 1 product toe','err');return;}
    const fullNote=note+(priceCardsNote?`
Price Cards: ${priceCardsNote}`:'');
    const oid=isEdit?S.modal.order.id:null;
    S.modal=null;render();
    try{
      if(isEdit){
        // Update existing order
        await api(`orders?id=eq.${oid}`,{method:'PATCH',body:JSON.stringify({store_id:sid,note:fullNote})});
        await api(`order_items?order_id=eq.${oid}`,{method:'DELETE',headers:{}});
        const newItems=[];
        for(const r of rows){const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:oid,...r})});newItems.push(item)}
        const o=S.orders.find(x=>x.id===oid);if(o){o.store_id=sid;o.note=fullNote;}
        S.orderItems=(S.orderItems||[]).filter(i=>i.order_id!==oid);S.orderItems.push(...newItems);
        await logOrderHistory(oid,`✏️ Order aangepast door ${S.session.display_name||S.session.username}`);
        showToast('✓ '+t().saved);render();
      }else{
        // Check if there is already an open order for this store
        // For stores, use their own store_id; for admin/manager use selected store
const mergeStoreId=S.session.role==='store'?S.session.store_id:sid;
const existingOrder=S.orders.find(o=>o.store_id===mergeStoreId&&o.status==='new');
        if(existingOrder){
          // Merge into existing order - add/update products
          const existingItems=(S.orderItems||[]).filter(i=>i.order_id===existingOrder.id);
          for(const r of rows){
            const existing=existingItems.find(i=>i.orderable_product_id===r.orderable_product_id&&r.orderable_product_id);
            if(existing){
              const newQty=existing.quantity+r.quantity;
              await api(`order_items?id=eq.${existing.id}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})});
              existing.quantity=newQty;
            }else{
              const[item]=await api('order_items',{method:'POST',body:JSON.stringify({order_id:existingOrder.id,...r})});
              if(item)S.orderItems.push(item);
            }
          }
          // Update note if provided - merge with comma
          if(fullNote&&fullNote.trim()){
            const combined=existingOrder.note?existingOrder.note+', '+fullNote:fullNote;
            await api(`orders?id=eq.${existingOrder.id}`,{method:'PATCH',body:JSON.stringify({note:combined})});
            existingOrder.note=combined;
          }
          showToast('✓ '+t().mergedOrder);render();
        }else{
          // Create new order
          const store=S.stores.find(s=>s.id===sid);

  // New product qty +/- handlers - save scroll position to prevent jumping
  function updateQty(pid, delta){
    if(!S.modal.orderQtys)S.modal.orderQtys={};
    if(!S.modal.requestedProductIds)S.modal.requestedProductIds=[];
    if(!S.modal.removedProductIds)S.modal.removedProductIds=[];
    const newQty=Math.max(0,(S.modal.orderQtys[pid]||0)+delta);
    S.modal.orderQtys[pid]=newQty;
    const prod=(S.orderableProducts||[]).find(p=>p.id===pid);
    
    // If admin adds a new product, add it to requestedProductIds
    if(newQty>0&&!S.modal.requestedProductIds.includes(pid)){
      S.modal.requestedProductIds.push(pid);
      // Also remove from removedProductIds if it was there
      S.modal.removedProductIds=S.modal.removedProductIds.filter(id=>id!==pid);
    }
    // If qty goes to 0 and it was added by admin (not originally requested by store),
    // remove from requestedProductIds entirely
    if(newQty===0&&S.modal.requestedProductIds.includes(pid)){
      // Check if it was originally requested - if not, remove from list
      // We track this by checking if it was in the original order items
      const wasOriginal=(S.modal._originalRequestedIds||[]).includes(pid);
      if(!wasOriginal){
        S.modal.requestedProductIds=S.modal.requestedProductIds.filter(id=>id!==pid);
      }else{
        // Was originally requested - mark as removed (red)
        if(!S.modal.removedProductIds.includes(pid))S.modal.removedProductIds.push(pid);
      }
    }
    
    // Update product row DOM directly
    const row=document.querySelector(`[onclick="toggleOrderProduct(${pid})"]`);
    if(row){
      row.style.background=newQty>0?'rgba(99,153,34,0.08)':'var(--bg2)';
      row.style.borderColor=newQty>0?'rgba(99,153,34,0.3)':'var(--b3)';
      const nameSpan=row.querySelector('span:first-child');
      if(nameSpan){nameSpan.style.fontWeight=newQty>0?'600':'400';nameSpan.style.color=newQty>0?'#639922':'var(--t1)';}
    }
    // Update qty display
    const qtyDisplay=row?row.querySelector('div[onclick] span:nth-child(2)'):null;
    if(qtyDisplay)qtyDisplay.textContent=newQty;

    // Update shopping list - rebuild properly with requestedProductIds
    rebuildShoppingList();

    // Update totaal
    const totaal=document.getElementById('order-totaal');
    if(totaal){
      const total=Object.values(S.modal.orderQtys).reduce((a,b)=>a+b,0);
      totaal.textContent=total+' producten';
    }

    // Handle PRICE CARDS
    if(prod&&prod.name==='PRICE CARDS'){
      S.modal.showPriceCards=newQty>0;
      const pcSection=document.getElementById('price-cards-section');
      if(pcSection)pcSection.style.display=newQty>0?'block':'none';
    }
    // If removed from removed list when qty increases
    if(newQty>0&&S.modal.removedProductIds){
      const ri=S.modal.removedProductIds.indexOf(pid);
      if(ri>-1)S.modal.removedProductIds.splice(ri,1);
    }
    // If qty goes to 0 and not in requestedProductIds, add to removed
    if(newQty===0&&S.modal.requestedProductIds&&S.modal.requestedProductIds.includes(pid)){
      if(!S.modal.removedProductIds)S.modal.removedProductIds=[];
      if(!S.modal.removedProductIds.includes(pid))S.modal.removedProductIds.push(pid);
    }
    rebuildShoppingList();
  }

// Poll every 5 minutes to catch orders planned while store is logged in

function checkDeliveryNotification(){
  if(!S.session||S.session.role!=='store')return;
  const storeId=S.session.store_id;
  if(!storeId)return;
  
  const todayStr=today();
  const tomorrowDate=new Date();
  tomorrowDate.setDate(tomorrowDate.getDate()+1);
  const tomorrowStr=tomorrowDate.toLocaleDateString('sv-SE',{timeZone:'Europe/Amsterdam'});
  
  // Check dismissed keys
  const dismissedToday=localStorage.getItem(`dn_today_${storeId}_${todayStr}`);
  const dismissedTomorrow=localStorage.getItem(`dn_tomorrow_${storeId}_${todayStr}`);
  
  // Find approved/sent orders for this store
  const orders=S.orders||[];
  


  // Check if there's a delivery TODAY
  const deliveryToday=orders.find(o=>
    o.store_id===storeId&&
    (o.status==='approved'||o.status==='sent')&&
    o.delivery_date===todayStr
  );
  
  // Check if there's a delivery TOMORROW
  const deliveryTomorrow=orders.find(o=>
    o.store_id===storeId&&
    (o.status==='approved'||o.status==='sent')&&
    o.delivery_date===tomorrowStr
  );
  
  if(deliveryToday&&!dismissedToday){
    showDeliveryNotif('today',todayStr,storeId);
  } else if(deliveryTomorrow&&!dismissedTomorrow){
    showDeliveryNotif('tomorrow',tomorrowStr,storeId);
  }
}

function showDeliveryNotif(type, dateStr, storeId){
  const notif=document.getElementById('delivery-notif');
  const emoji=document.getElementById('dn-emoji');
  const title=document.getElementById('dn-title');
  const sub=document.getElementById('dn-sub');
  if(!notif)return;
  
  if(type==='today'){
    notif.dataset.dismissKey=`dn_today_${storeId}_${today()}`;
    emoji.textContent='🚚';
    title.textContent='Je krijgt vandaag een levering!';
    sub.textContent='Jouw bestelling wordt vandaag bezorgd. Zorg dat je er klaar voor bent!';
  } else {
    notif.dataset.dismissKey=`dn_tomorrow_${storeId}_${today()}`;
    emoji.textContent='📦';
    title.textContent='Je krijgt morgen een levering!';
    sub.textContent='Jouw bestelling wordt morgen bezorgd. Wees er klaar voor!';
  }
  
  setTimeout(()=>notif.classList.add('show'), 800);
}

function dismissDeliveryNotif(){
  const notif=document.getElementById('delivery-notif');
  if(!notif)return;
  const key=notif.dataset.dismissKey;
  if(key)localStorage.setItem(key,'1');
  notif.classList.remove('show');
}

  try{

    const weekStart=getWeekStart();
    const ids=(S.weeklyRequests||[]).filter(r=>r.week_start===weekStart).map(r=>r.id);
    for(const id of ids){

    S.weeklyRequests=(S.weeklyRequests||[]).map(r=>ids.includes(r.id)?{...r,week_start:'2000-01-01'}:r);
    showToast('✓ Weeklijst gereset');render();

}

async function updateOrderStatus(id,status){
  try{
    await api(`orders?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({status})});
    const o=S.orders.find(x=>x.id===id);
    if(o){
      o.status=status;
      if(status==='done'){
        const items=(S.orderItems||[]).filter(i=>i.order_id===id);
        for(const item of items){
          const sid=o.store_id;
          const addQty=item.quantity;
          // Find product_id: use item.product_id if set, otherwise match via products table by name
          let pid=item.product_id;
          if(!pid&&item.product_name){
            const matchedProduct=S.products.find(p=>p.name===item.product_name);
            if(matchedProduct)pid=matchedProduct.id;
          }
          if(!pid)continue; // skip if no matching product found in stock
          const key=sid+'-'+pid,newQty=(S.stock[key]??0)+addQty;
          const ex=await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`);
          if(ex&&ex.length){await api(`stock?store_id=eq.${sid}&product_id=eq.${pid}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})})}
          else{await api('stock',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,quantity:newQty})})}
          S.stock[key]=newQty;
          api('stock_history',{method:'POST',body:JSON.stringify({store_id:sid,product_id:pid,account_id:S.session?.id,old_quantity:newQty-addQty,new_quantity:newQty})})
            .then(res=>{if(res&&res[0])(S.stockHistory=S.stockHistory||[]).unshift(res[0])}).catch(()=>{});
        }
        const st=S.stores.find(s=>s.id===o.store_id);
        await logOrderHistory(id,`✅ Geleverd — voorraad bijgewerkt voor ${st?st.name:'winkel'}`);
        showToast('✓ '+t().stockUpdatedFor+' '+(st?st.name:''));
      }else if(status==='sent'){
        await logOrderHistory(id,'📦 Order verzonden');
        showToast('✓ '+t().saved);
      }else{showToast('✓ '+t().saved)}
    }
    render();
  }catch(e){showToast('❌ '+t().errSave,'err')}
}

// Auto-refresh polling every 30 seconds for admin
let pollInterval=null;
let lastOrderCount=0;
let lastMsgCount=0;

function startPolling(){
  if(pollInterval)clearInterval(pollInterval);
  pollInterval=setInterval(async()=>{
    if(!S.session||S.session.role!=='admin')return;
    try{
      const[orders,messages]=await Promise.all([
        api('orders?order=id.desc'),
        api('messages?order=created_at'),
      ]);
      const newOrders=orders||[];
      const newMsgs=messages||[];
      const newOrderCount=newOrders.length;
      const newMsgCount=newMsgs.filter(m=>m.from_account!=='admin'&&!m.is_read).length;

      // Check for new orders
      if(lastOrderCount>0&&newOrderCount>lastOrderCount){
        const diff=newOrderCount-lastOrderCount;
        showNotification(`📦 ${diff} nieuwe order${diff>1?'s':''}!`);
      }
      // Check for new unread messages
      const prevUnread=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;
      if(prevUnread<newMsgCount){
        const diff=newMsgCount-prevUnread;
        showNotification(`💬 ${diff} nieuw bericht${diff>1?'en':''}!`);
      }

      lastOrderCount=newOrderCount;
      S.orders=newOrders;
      S.messages=newMsgs;
      // Only re-render the badge counts (non-disruptive)
      updateBadges();
    }catch(e){}
  },5000);
}

function stopPolling(){
  if(pollInterval){clearInterval(pollInterval);pollInterval=null;}
}

function updateBadges(){
  // Update tab badges without full re-render
  const or=openReqs();
  const unread=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;
  const orderTab=document.querySelector('[data-sub="orders"]');
  if(orderTab){
    const badges=[];
    if(or)badges.push(`<span style="background:#3C3489;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">${or}</span>`);
    if(unread)badges.push(`<span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">💬${unread}</span>`);
    orderTab.innerHTML=TR[S.lang].orders+badges.join('');
  }
}

function showNotification(msg){
  // Play a soft beep
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=880;gain.gain.value=0.1;
    osc.start();gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
    osc.stop(ctx.currentTime+0.3);
  }catch(e){}
  // Show toast notification
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:1.5rem;right:1.5rem;background:#D4537E;color:#fff;border-radius:var(--r1);padding:12px 18px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);cursor:pointer;font-family:var(--sans)';
  el.textContent=msg;
  el.addEventListener('click',()=>{el.remove();S.adminSubTab='orders';render()});
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),6000);
  // Push notification
  sendPushNotification('Rejoes Stock', msg, '/');
}

function requestNotificationPermission(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}

// Read company handle from URL path
// e.g. /application/rejoes -> auto-login to rejoes
(function(){
  const path = window.location.pathname;
  const match = path.match(/(?:\/application\/|\/|^)([a-z0-9-]+)\/?$/i);
  if(match && match[1]){
    const handle = match[1].toLowerCase();
    // Auto-lookup company on load
    window._autoHandle = handle;
  }else{
    // Check sessionStorage (from redirect)
    const stored = sessionStorage.getItem('autoHandle');
    if(stored){window._autoHandle=stored;sessionStorage.removeItem('autoHandle');}
  }
})();

// Capture PWA install prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  window._pwaInstallPrompt = e;
  showPWABanner();
  // Show portal install button if on portal screen
  const portalBtn=document.getElementById('pwa-portal-btn');
  if(portalBtn&&!isPWAInstalled())portalBtn.style.display='block';
});

window.addEventListener('appinstalled', () => {
  window._pwaInstallPrompt = null;
  hidePWABanner();
  showToast('✓ App geïnstalleerd!');
});

function isPWAInstalled(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
}

function showPWABanner(){
  if(isPWAInstalled())return;
  const banner=document.getElementById('pwa-banner');
  if(banner)setTimeout(()=>banner.classList.add('show'),1500);
}

function hidePWABanner(){
  const banner=document.getElementById('pwa-banner');
  if(banner)banner.classList.remove('show');
}

function checkAndShowPWABanner(){
  if(isPWAInstalled())return; // Never show if installed
  if(!window._pwaInstallPrompt)return; // No prompt available
  
  const isLoggedIn=!!S.session;
  
  if(!isLoggedIn){
    // Portal/login screen: always show
    showPWABanner();
  }else{
    // App screen: only show if not dismissed before
    if(!localStorage.getItem('pwaBannerDismissedLoggedIn')){
      showPWABanner();
    }
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  const installBtn=document.getElementById('pwa-install-btn');
  const closeBtn=document.getElementById('pwa-close-btn');
  
  if(installBtn)installBtn.addEventListener('click',async()=>{
    if(window._pwaInstallPrompt){
      window._pwaInstallPrompt.prompt();
      const result=await window._pwaInstallPrompt.userChoice;
      if(result.outcome==='accepted'){
        window._pwaInstallPrompt=null;
        hidePWABanner();
      }
    }
  });
  
  if(closeBtn)closeBtn.addEventListener('click',()=>{
    hidePWABanner();
    // Only remember dismissal when logged in
    if(S.session){
      localStorage.setItem('pwaBannerDismissedLoggedIn','true');
    }
    // On portal/login: don't remember, will show again next time
  });

  // Show banner after delay if prompt available
  setTimeout(()=>{
    checkAndShowPWABanner();
    // Also show install button in portal
    const portalBtn=document.getElementById('pwa-portal-btn');
    const portalInstall=document.getElementById('pwa-portal-install');
      if(portalInstall){
      portalInstall.addEventListener('click',async()=>{
        if(window._pwaInstallPrompt){
          // Android Chrome - use native prompt
          window._pwaInstallPrompt.prompt();
          const r=await window._pwaInstallPrompt.userChoice;
          if(r.outcome==='accepted'){window._pwaInstallPrompt=null;}
        } else if(isPWAInstalled()){
          showToast('✓ App is al geïnstalleerd!');
        } else {
          // Show manual instructions
          const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
          if(isIOS){
            alert('iPhone instructies:\n\n1. Tik op het deel-icoon (□↑) onderaan\n2. Scroll naar beneden\n3. Tik op "Zet op beginscherm"\n4. Tik op "Voeg toe"');
          } else {
            alert('Android instructies:\n\n1. Tik op de drie puntjes (⋮) rechtsboven in Chrome\n2. Tik op "App installeren" of "Toevoegen aan startscherm"\n3. Tik op "Installeren"');
          }
        }
      });
    }
  },2000);
});

// Send local push notification (works when app is open)
function sendPushNotification(title, body, url){
  if(Notification.permission==='granted'){
    if(S.swReg){
      S.swReg.showNotification(title,{
        body,
        icon:'icon-192.png',
        badge:'icon-192.png',
        vibrate:[200,100,200],
        data:{url},
        tag:'rejoes-stock'
      });
    }else{
      new Notification(title,{body,icon:'icon-192.png'});
    }
  }
}
