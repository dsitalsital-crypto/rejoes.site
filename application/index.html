<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#fff;--bg2:#f5f5f3;--bg3:#eeede9;
  --t1:#1a1a1a;--t2:#6b6b6b;--t3:#9b9b9b;
  --b2:rgba(0,0,0,0.2);--b3:rgba(0,0,0,0.1);
  --r1:8px;--r2:12px;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg1:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
  --t1:#e8e8e8;--t2:#a0a0a0;--t3:#6a6a6a;
  --b2:rgba(255,255,255,0.2);--b3:rgba(255,255,255,0.1);
}}
body{background:var(--bg3);font-family:var(--sans);color:var(--t1);min-height:100vh;padding:1.5rem;transition:background .3s,color .3s}
.wrap{max-width:1100px;margin:0 auto}
input,select,textarea,button{font-family:var(--sans)}
input[type=text],input[type=password],input[type=number],select{height:34px;font-size:13px;border-radius:var(--r1);border:0.5px solid var(--b2);background:var(--bg2);color:var(--t1);padding:0 10px;width:100%}
textarea{font-size:13px;border-radius:var(--r1);border:0.5px solid var(--b2);background:var(--bg2);color:var(--t1);padding:7px 10px;width:100%;height:60px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:#D4537E;box-shadow:0 0 0 2px rgba(212,83,126,.15)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;font-size:12px;border:0.5px solid var(--b2);border-radius:var(--r1);background:transparent;color:var(--t1);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.bp{background:#D4537E;color:#fff;border-color:#D4537E}.bp:hover{background:#993556}
.bsm{padding:3px 9px;font-size:11px}
.bd{color:#A32D2D;border-color:transparent}.bd:hover{background:#FCEBEB}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.bok{background:#EAF3DE;color:#3B6D11}.blow{background:#FAEEDA;color:#854F0B}.bout{background:#FCEBEB;color:#A32D2D}
.bnew{background:#EEEDFE;color:#3C3489}.bsent{background:#E1F5EE;color:#085041}.bdone{background:#EAF3DE;color:#27500A}
.badm{background:#FBEAF0;color:#72243E}.bstr{background:#E6F1FB;color:#0C447C}.bmgr{background:#EEF6E8;color:#2E6B0A}.bdrv{background:#E8F4FD;color:#0C5C8A}
.met{background:var(--bg2);border-radius:var(--r1);padding:.8rem 1rem}
.met-l{font-size:11px;color:var(--t2);margin-bottom:3px}.met-v{font-size:20px;font-weight:500}
.panel{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r2);overflow:hidden;margin-bottom:.9rem}
.ph{padding:10px 14px;border-bottom:0.5px solid var(--b3);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.pht{font-size:13px;font-weight:500}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
thead th{padding:7px 12px;text-align:left;color:var(--t2);font-weight:400;border-bottom:0.5px solid var(--b3);white-space:nowrap}
tbody td{padding:7px 12px;border-bottom:0.5px solid var(--b3);vertical-align:middle;overflow:hidden;text-overflow:ellipsis}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--r1);padding:3px;border:0.5px solid var(--b3);flex-wrap:wrap;margin-bottom:1rem}
.tab{padding:5px 11px;font-size:12px;border:none;background:transparent;color:var(--t2);border-radius:6px;cursor:pointer;transition:all .15s}
.tab.on{background:var(--bg1);color:var(--t1);font-weight:500;border:0.5px solid var(--b3)}
.barcell{display:flex;align-items:center;gap:5px}
.barbg{flex:1;height:5px;background:var(--bg2);border-radius:3px;min-width:35px}
.barfill{height:5px;border-radius:3px}
.mover{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999}
.mbox{background:var(--bg1);border-radius:var(--r2);border:0.5px solid var(--b3);padding:1.4rem;width:min(800px,95vw);max-height:92vh;overflow-y:auto}
.mbox h3{font-size:15px;font-weight:500;margin-bottom:1rem}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:11px;color:var(--t2);margin-bottom:3px}
.fa{display:flex;gap:7px;justify-content:flex-end;margin-top:1rem}
.ai{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:var(--r1);margin-bottom:7px;font-size:12px}
.alow{background:#FAEEDA;border:0.5px solid #FAC775}
.aout{background:#FCEBEB;border:0.5px solid #F7C1C1}
.lcwrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.lcbox{background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r2);padding:2rem;width:340px;max-width:95vw}
.lbtn{padding:3px 10px;font-size:11px;border-radius:20px;border:0.5px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s}
.lbtn.on{background:#D4537E;color:#fff;border-color:#D4537E}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--t2);font-size:13px;gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--b3);border-top-color:#D4537E;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg1);border:0.5px solid var(--b3);border-radius:var(--r1);padding:10px 16px;font-size:12px;z-index:9999;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.toast.err{border-color:#E24B4A;color:#A32D2D}
.chat-bubble{display:flex;flex-direction:column;margin-bottom:8px}
.chat-msg{padding:7px 11px;border-radius:12px;font-size:12px;max-width:78%;word-break:break-word}
</style>

<style>
/* Delivery Notification Overlay */
#delivery-notif{
  position:fixed;inset:0;z-index:999999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(15,5,32,0.92);
  backdrop-filter:blur(8px);
  opacity:0;transition:opacity .5s ease;
  pointer-events:none;
}
#delivery-notif.show{opacity:1;pointer-events:all}
#delivery-notif .dn-box{
  background:linear-gradient(135deg,#1a0a2e 0%,#2d1660 50%,#0f0520 100%);
  border:1px solid rgba(168,85,247,0.4);
  border-radius:24px;
  padding:40px 48px;
  max-width:480px;width:90%;
  text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 0 60px rgba(168,85,247,0.3),0 0 120px rgba(255,45,120,0.15);
  animation:dn-pop .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes dn-pop{from{transform:scale(.7) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
#delivery-notif .dn-emoji{font-size:64px;margin-bottom:16px;display:block;animation:dn-bounce 2s ease-in-out infinite}
@keyframes dn-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#delivery-notif .dn-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:10px;font-family:'Space Grotesk',sans-serif;letter-spacing:-0.5px}
#delivery-notif .dn-sub{font-size:16px;color:rgba(255,255,255,0.7);margin-bottom:28px;line-height:1.6}
#delivery-notif .dn-btn{
  background:linear-gradient(135deg,#FF2D78,#A855F7);
  color:#fff;border:none;border-radius:50px;
  padding:14px 36px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  box-shadow:0 0 20px rgba(255,45,120,0.4);
  transition:all .2s;letter-spacing:.5px;
}
#delivery-notif .dn-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,45,120,0.6)}
/* Y2K shapes */
.dn-shape{position:absolute;pointer-events:none;opacity:0.15}
.dn-star{animation:dn-spin 8s linear infinite}
.dn-circle{animation:dn-float 4s ease-in-out infinite}
.dn-diamond{animation:dn-spin 6s linear infinite reverse}
@keyframes dn-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes dn-float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(10deg)}}
</style>

// Session persistence - restore session if within 1 hour
function getSavedSession(){
  try{
    const raw=localStorage.getItem('appSession');
    if(!raw)return null;
    const{session,savedAt}=JSON.parse(raw);
    if(Date.now()-savedAt<60*60*1000)return session; // 1 hour
    localStorage.removeItem('appSession');
  }catch(e){}
  return null;
}
function saveSession(session){
  try{localStorage.setItem('appSession',JSON.stringify({session,savedAt:Date.now()}))}catch(e){}
}
function clearSession(){
  try{localStorage.removeItem('appSession')}catch(e){}
}

async function api(path,opts={},notify=null){
  const url=SB+'/rest/v1/'+path;
  const isDelete=opts.method==='DELETE';
  const headers={'Content-Type':'application/json'};
  if(!isDelete)headers['Prefer']='return=representation';
  if(S.session){
    headers['X-User-Role']=S.session.role||'guest';
    if(S.session.store_id)headers['X-User-Store']=String(S.session.store_id);
  }
  if(notify)headers['X-Notify']=JSON.stringify(notify);
  const res=await fetch(url,{...opts,headers});
  if(!res.ok){const e=await res.text();throw new Error(e)}
  const txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function loadAll(){
  S.loading=true;render();
  const cid=S.company?.id;
  const companyFilter=cid?`&company_id=eq.${cid}`:'';
  try{
    const[stores,products,stockRows,orders,orderItems,accounts,messages,complaints,orderHistory,complaintMsgs,attendance,stockHistory,weeklyRequests,orderableProducts,suppliers]=await Promise.all([
      api('stores?order=id'+companyFilter),api('products?order=name'),api('stock?select=*'),
      api('orders?order=id.desc'),api('order_items?select=*'),
      api('accounts?order=username'+companyFilter),api('messages?order=created_at'),
      api('complaints?order=id.desc'),
      api('order_history?order=created_at.desc'),
      api('complaint_messages?order=created_at'),
      api('attendance?order=logged_in_at.desc&login_date=eq.'+today()),
      api('stock_history?order=changed_at.desc&limit=200'),
      api('weekly_product_requests?order=quantity.desc'),
      api('orderable_products?order=sort_order&select=id,name,category,unit,supplier,min_stock,default_qty,artikel_id,active,for_type,sort_order'),
      api('suppliers?order=name'),
    ]);
    S.stores=stores||[];S.products=products||[];
    S.stock={};(stockRows||[]).forEach(r=>{S.stock[r.store_id+'-'+r.product_id]=r.quantity});
    S.orders=orders||[];S.orderItems=orderItems||[];
    S.accounts=accounts||[];S.messages=messages||[];
    S.complaints=complaints||[];
    S.orderHistory=orderHistory||[];
    S.complaintMsgs=complaintMsgs||[];
    S.attendance=attendance||[];
    S.stockHistory=stockHistory||[];
    S.weeklyRequests=weeklyRequests||[];
    S.orderableProducts=orderableProducts||[];
    S.suppliers=suppliers||[];
  }catch(e){showToast('❌ '+e.message,'err')}
  S.loading=false;render();
}

const qty=(sid,pid)=>S.stock[sid+'-'+pid]??0;
const storeTotal=sid=>S.products.reduce((a,p)=>a+qty(sid,p.id),0);
const storeItems=sid=>S.products.filter(p=>qty(sid,p.id)>0).length;
const totalAll=()=>{let x=0;S.products.forEach(p=>S.stores.forEach(s=>{x+=qty(s.id,p.id)}));return x};
const allLow=()=>{let c=0;S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(p.min_stock>0&&q>0&&q<p.min_stock)c++}));return c};
const allOut=()=>{let c=0;S.products.forEach(p=>S.stores.forEach(s=>{if(p.min_stock>0&&qty(s.id,p.id)===0)c++}));return c};
const openReqs=()=>(S.orders||[]).filter(o=>o.status==='new'||o.status==='sent').length;

function sbadge(q,min){const l=t();if(min===0)return`<span class="badge bok">${l.ok}</span>`;return q===0?`<span class="badge bout">${l.outLbl}</span>`:q<min?`<span class="badge blow">${l.lowLbl}</span>`:`<span class="badge bok">${l.ok}</span>`}
function rbadge(s){const l=t();
  if(s==='new') return`<span class="badge bnew">🆕 Nieuw</span>`;
  if(s==='approved') return`<span class="badge" style="background:#E8F4FD;color:#0C5C8A">✅ Goedgekeurd</span>`;
  if(s==='sent') return`<span class="badge bsent">🚚 Onderweg</span>`;
  if(s==='done') return`<span class="badge bdone">✓ Geleverd</span>`;
  return`<span class="badge bnew">${s}</span>`;
}

function showToast(msg,type='ok'){
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

function applyTheme(){
  const style=document.getElementById('theme-style');
  const isRejoes=S.company?.handle==='rejoes';
  
  // Show/hide rejoes background
  const rejesBg=document.getElementById('rejoes-bg');
  if(rejesBg)rejesBg.style.display=isRejoes?'block':'none';
  
  // Apply Rejoes theme class to body
  if(isRejoes){
    const isDayMode=!S.darkMode;
    if(S.session){
      document.body.classList.add('rejoes-app');
      document.body.classList.remove('rejoes-theme','rejoes-day');
      // Day/night for app
      if(isDayMode){
        document.body.classList.add('rejoes-day-app');
      }else{
        document.body.classList.remove('rejoes-day-app');
      }
    }else{
      document.body.classList.remove('rejoes-app','rejoes-day-app');
      if(isDayMode){
        document.body.classList.add('rejoes-day');
        document.body.classList.remove('rejoes-theme');
      }else{
        document.body.classList.add('rejoes-theme');
        document.body.classList.remove('rejoes-day');
      }
    }
    document.body.style.background='';
  }else{
    document.body.classList.remove('rejoes-theme','rejoes-app','rejoes-day','rejoes-day-app');
  }

  if(style){
    if(isRejoes&&S.darkMode){
      style.textContent=`:root{--bg1:#1a0a2e;--bg2:#2d1660;--bg3:#0f0520;--t1:#e8e0f0;--t2:#C4A8E8;--t3:#8060a0;--b2:rgba(168,85,247,0.3);--b3:rgba(168,85,247,0.15);}`;
    }else if(isRejoes&&!S.darkMode){
      // Day mode for Rejoes app - white bg, purple text/accents
      style.textContent=`:root{--bg1:#ffffff;--bg2:#f8f4ff;--bg3:#ffffff;--t1:#1a0040;--t2:#6B3FA0;--t3:#9b7bc0;--b2:rgba(168,85,247,0.2);--b3:rgba(168,85,247,0.1);}`;
    }else if(S.darkMode){

}

function toggleDarkMode(){
  S.darkMode=!S.darkMode;
  localStorage.setItem('darkMode',S.darkMode);
  applyTheme();
  render();
}

function render(){
  if(S.session)saveSession(S.session);
  applyTheme();
  // Save scroll position before render
  const scrollY=window.scrollY;
  const scrollX=window.scrollX;
  setTimeout(()=>checkAndShowPWABanner&&checkAndShowPWABanner(),500);
  let html;
  if(S.loading){
    html=`<div class="loading"><div class="spinner"></div>${t().loading}</div>`;
  }else if(S.screen==='portal'){
    html=buildPortal();
  }else if(S.screen==='login'){
    html=S.session?buildApp():buildLogin();
  }else{
    html=buildApp();
  }
  g('root').innerHTML=html;
  bind();if(!S.loading&&S.modal)bindModal();
  // Restore scroll position after browser paints
  requestAnimationFrame(()=>{
    window.scrollTo(scrollX, scrollY);
  });
  // Check delivery notification for stores after every render
  if(S.session&&S.session.role==='store'){
    checkDeliveryNotification();
  }
  if(S.modal&&(S.modal.type==='chat'||S.modal.type==='complaint-chat')){setTimeout(()=>{const el=g('chat-msgs');if(el)el.scrollTop=el.scrollHeight},50)}
}
function renderKeepFocus(focusId){
  const val=focusId?gv(focusId):'';render();
  if(focusId){const e=g(focusId);if(e){e.focus();e.value=val;e.setSelectionRange(val.length,val.length)}}
}

    <div class="met"><div class="met-l">${l.storesLbl}</div><div class="met-v">${S.stores.length}</div></div>

    <button class="tab ${sub==='alerts'?'on':''}" data-sub="alerts">${l.alerts}${al?` <span style="background:#A32D2D;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">${al}</span>`:''}</button>
    <button class="tab ${sub==='orders'?'on':''}" data-sub="orders">${l.orders}${or?` <span style="background:#3C3489;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">${or}</span>`:''}${unread?` <span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">💬${unread}</span>`:''}</button>
    <button class="tab ${sub==='stores'?'on':''}" data-sub="stores">${l.stores}</button>
    <button class="tab ${sub==='products'?'on':''}" data-sub="products">${l.products}</button>
    ${S.session.role==='admin'?`<button class="tab ${sub==='accounts'?'on':''}" data-sub="accounts">${l.accounts}</button>`:''}
    ${S.session.role==='admin'?`<button class="tab ${sub==='attendance'?'on':''}" data-sub="attendance">🕐 Aanwezigheid</button>`:''}
    ${(S.session.role==='admin'||S.session.role==='manager')?`<button class="tab ${sub==='export'?'on':''}" data-sub="export">📤 Export</button>`:''}
    ${(S.session.role==='admin'||S.session.role==='manager')?`<button class="tab ${sub==='weekly'?'on':''}" data-sub="weekly">📈 Weeklijst</button>`:''}
    <button class="tab ${sub==='complaints'?'on':''}" data-sub="complaints">📋 Klachten${(S.complaints||[]).filter(c=>c.status==='open').length?` <span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:3px">${(S.complaints||[]).filter(c=>c.status==='open').length}</span>`:''}</button>
  </div>
  ${sub==='dashboard'?bDashboard():sub==='stock'?bStock():sub==='alerts'?bAlerts():sub==='orders'?bOrders():sub==='stores'?bStores():sub==='products'?bProducts():sub==='complaints'?bComplaints():sub==='attendance'?bAttendance():sub==='export'?bExportPage():sub==='weekly'?bWeeklyRequests():bAccounts()}

function bDashboard(){
  const l=t();
  const period=S.dashPeriod||'week';
  const now=new Date();

  // Orders per period
  const ordersFiltered=filterByPeriod([...S.orders],'created_at',period);
  const newOrders=ordersFiltered.filter(o=>o.status==='new').length;
  const sentOrders=ordersFiltered.filter(o=>o.status==='sent').length;
  const doneOrders=ordersFiltered.filter(o=>o.status==='done').length;

  // Top stores by orders
  const storeOrderCounts=S.stores.map(s=>({
    store:s,
    count:ordersFiltered.filter(o=>o.store_id===s.id).length
  })).sort((a,b)=>b.count-a.count).slice(0,5);

  // Low stock count
  const lowCount=allLow();
  const outCount=allOut();

  // Recent activity
  const recentOrders=[...S.orders].sort((a,b)=>b.id-a.id).slice(0,5);

  // Complaints
  const openComplaints=(S.complaints||[]).filter(c=>c.status==='open').length;

  // Attendance today
  const todayAtt=S.attendance.filter(a=>a.login_date===today()).length;

  return`<div>
  <!-- Period selector -->
  <div style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
    <span style="font-size:12px;color:var(--t2);font-weight:500">Periode:</span>
    ${['day','week','month','year'].map(p=>`<button class="btn bsm ${period===p?'bp':''} dash-period" data-val="${p}">${{day:l.today,week:l.thisWeek,month:l.thisMonth,year:l.thisYear}[p]}</button>`).join('')}
  </div>

  <!-- Top metrics -->
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem">
    <div class="met" style="border-left:3px solid #7F77DD">
      <div class="met-l">Orders ${period==='day'?l.today:period==='week'?l.thisWeek:period==='month'?l.thisMonth:l.thisYear}</div>
      <div class="met-v">${ordersFiltered.length}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">✅ ${doneOrders} klaar · 📦 ${sentOrders} verzonden · 🆕 ${newOrders} nieuw</div>
    </div>
    <div class="met" style="border-left:3px solid ${RED}">
      <div class="met-l" style="color:#A32D2D">Uitverkocht</div>
      <div class="met-v" style="color:${RED}">${outCount}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">product-winkel combinaties</div>
    </div>
    <div class="met" style="border-left:3px solid ${AMBER}">
      <div class="met-l" style="color:#854F0B">Laag voorraad</div>
      <div class="met-v" style="color:${AMBER}">${lowCount}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:2px">product-winkel combinaties</div>
    </div>
    <div class="met" style="border-left:3px solid #E24B4A">
      <div class="met-l">Open klachten</div>
      <div class="met-v" style="color:#E24B4A">${openComplaints}</div>
    </div>
    <div class="met" style="border-left:3px solid ${GREEN}">
      <div class="met-l">Aanwezig vandaag</div>
      <div class="met-v" style="color:${GREEN}">${todayAtt} / ${S.stores.length}</div>
    </div>
    <div class="met" style="border-left:3px solid #D4537E">
      <div class="met-l">Totaal stuks</div>
      <div class="met-v">${totalAll().toLocaleString(NL,{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:TZ})}</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem">
    <!-- Top winkels -->
    <div class="panel">
      <div class="ph"><span class="pht">🏆 Meeste orders</span></div>
      <div style="padding:10px">
        ${storeOrderCounts.length?storeOrderCounts.map((x,i)=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--b3)">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:11px;color:var(--t3);min-width:16px">${i+1}.</span>
              <span style="font-size:13px;font-weight:500">${x.store.name}</span>
            </div>
            <span class="badge bstr">${x.count} orders</span>
          </div>`).join(''):'<div style="color:var(--t3);font-size:12px;padding:1rem;text-align:center">Geen orders</div>'}
      </div>
    </div>

    <!-- Recent orders -->
    <div class="panel">
      <div class="ph"><span class="pht">🕐 Recente orders</span></div>
      <div style="padding:10px">
        ${recentOrders.length?recentOrders.map(o=>{
          const st=S.stores.find(x=>x.id===o.store_id);
          const num=String(o.order_number||o.id).padStart(4,'0');
          return`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--b3)">
            <div>
              <span style="font-size:12px;font-weight:500;color:#D4537E">#${num}</span>
              <span style="font-size:12px;margin-left:6px">${st?st.name:'—'}</span>
            </div>
            ${rbadge(o.status)}
          </div>`;
        }).join(''):'<div style="color:var(--t3);font-size:12px;padding:1rem;text-align:center">Geen orders</div>'}
      </div>
    </div>
  </div>

  <!-- Low stock alerts -->
  ${lowCount+outCount>0?`<div class="panel">
    <div class="ph"><span class="pht">⚠️ Aandacht nodig</span></div>
    <div style="padding:10px;display:flex;flex-wrap:wrap;gap:6px">
      ${S.products.flatMap(p=>S.stores.filter(s=>p.min_stock>0&&qty(s.id,p.id)<p.min_stock).map(s=>({p,s,q:qty(s.id,p.id)}))).slice(0,12).map(({p,s,q})=>`
        <div style="background:${q===0?'#FCEBEB':'#FAEEDA'};border:0.5px solid ${q===0?'#F7C1C1':'#FAC775'};border-radius:var(--r1);padding:5px 10px;font-size:11px">
          <strong>${p.name}</strong> — ${s.name} <span style="color:${q===0?RED:AMBER}">(${q})</span>
        </div>`).join('')}
    </div>
  </div>`:''}
</div>`}

function bStock(){
  const l=t();
  const cols=S.filterStore==='all'?S.stores:S.stores.filter(s=>s.id===parseInt(S.filterStore));
  const maxQ=Math.max(1,...S.products.flatMap(p=>S.stores.map(s=>qty(s.id,p.id))));
  const filtered=S.products.filter(p=>{
    if(S.search&&!p.name.toLowerCase().includes(S.search.toLowerCase())&&!p.sku.toLowerCase().includes(S.search.toLowerCase()))return false;
    if(S.filterStore!=='all'){const sid=parseInt(S.filterStore),q=qty(sid,p.id);if(S.filterStatus==='low'&&!(q>0&&q<p.min_stock))return false;if(S.filterStatus==='out'&&q!==0)return false}
    return true;
  });
  const show=cols.slice(0,5),extra=cols.length-show.length;
  return`<div class="panel">
  <div class="ph"><span class="pht">${l.stockOv}</span>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
      <input type="text" id="srch" placeholder="${l.search}" value="${S.search}" style="width:130px;height:30px;font-size:12px">
      <select id="fstore" style="height:30px;font-size:12px"><option value="all">${l.allStores}</option>${S.stores.map(s=>`<option value="${s.id}" ${S.filterStore==s.id?'selected':''}>${s.name}</option>`).join('')}</select>
      <select id="fstatus" style="height:30px;font-size:12px"><option value="all">${l.allSt}</option><option value="low">${l.low}</option><option value="out">${l.outSt}</option></select>
    </div>
  </div>
  <div class="tw"><table>
    <colgroup><col style="width:160px"><col style="width:70px">${show.map(()=>'<col style="width:115px">').join('')}${extra?'<col style="width:70px">':''}<col style="width:58px"><col style="width:60px"></colgroup>
    <thead><tr><th>${l.product}</th><th>${l.sku}</th>${show.map(s=>`<th title="${s.name}">${s.name}</th>`).join('')}${extra?`<th>+${extra}</th>`:''}<th>${l.totalLbl}</th><th>${l.status}</th></tr></thead>
    <tbody>${filtered.length?filtered.map(p=>{
      const tot=S.stores.reduce((a,s)=>a+qty(s.id,p.id),0);
      return`<tr>
        <td><div style="font-weight:500">${p.name}</div><div style="font-size:10px;color:var(--t3)">${p.category}·${p.size}kg</div></td>
        <td style="color:var(--t2)">${p.sku}</td>
        ${show.map(s=>{const q=qty(s.id,p.id),pct=Math.round(q/maxQ*100),c=barCol(q,p.min_stock);
          return`<td><div class="barcell"><span style="min-width:26px;text-align:right;font-weight:500;color:${p.min_stock>0&&q===0?RED:p.min_stock>0&&q<p.min_stock?AMBER:'var(--t1)'}">${q}</span><div class="barbg"><div class="barfill" style="width:${pct}%;background:${c}"></div></div></div>
          <span class="elk" data-edit="${s.id}-${p.id}" style="font-size:10px;color:var(--t3);cursor:pointer">${l.edit.toLowerCase()}</span>
          <span class="rlk" data-req="${s.id}-${p.id}" style="font-size:10px;color:#7F77DD;cursor:pointer;margin-left:4px">${l.req}</span>
          <span class="shlk" data-sid="${s.id}" data-pid="${p.id}" style="font-size:10px;color:#639922;cursor:pointer;margin-left:4px">📋</span></td>`;
        }).join('')}
        ${extra?`<td style="color:var(--t3);font-size:11px">${l.useFilter}</td>`:''}
        <td style="font-weight:500">${tot}</td><td>${sbadge(tot,p.min_stock)}</td>
      </tr>`;
    }).join(''):`<tr><td colspan="20" style="text-align:center;padding:2rem;color:var(--t3)">${l.noProducts}</td></tr>`}
    </tbody>
  </table></div>
</div>`}

function bAlerts(){
  const l=t(),items=[];
  S.products.forEach(p=>S.stores.forEach(s=>{const q=qty(s.id,p.id);if(p.min_stock>0&&q===0)items.push({type:'out',s,p,q});else if(p.min_stock>0&&q<p.min_stock)items.push({type:'low',s,p,q})}));
  items.sort((a,b)=>a.type==='out'&&b.type!=='out'?-1:1);
  return`<div class="panel">
  <div class="ph"><span class="pht">${l.stockAlerts}</span><span style="font-size:11px;color:var(--t2)">${items.length} ${l.active}</span></div>
  <div style="padding:12px">${items.length?items.map(a=>`
    <div class="ai ${a.type==='out'?'aout':'alow'}">
      <div><div style="font-weight:500;font-size:12px">${a.p.name} — ${a.s.name}</div>
      <div style="font-size:11px;color:var(--t2)">${a.type==='out'?l.outOfStock:`${l.onlyLeft} ${a.q} ${l.leftOf} ${a.p.min_stock})`} · ${a.p.sku}</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        ${a.type==='out'?`<span class="badge bout">${l.outLbl}</span>`:`<span class="badge blow">${l.lowLbl}</span>`}
        <button class="btn bsm rlk" data-req="${a.s.id}-${a.p.id}">${l.reqBtn}</button>
      </div>
    </div>`).join(''):`<div style="text-align:center;padding:2rem;color:var(--t3)">${l.noAlerts}</div>`}
  </div>
</div>`}

function bOrders(){
  const l=t();
  const orderSearch=S.orderSearch||'';
  const allOrders=[...S.orders||[]].sort((a,b)=>b.id-a.id).filter(o=>{
    if(!orderSearch) return true;
    const num=String(o.order_number||o.id).padStart(4,'0');
    const st=S.stores.find(x=>x.id===o.store_id);
    return num.includes(orderSearch)||('#'+num).toLowerCase().includes(orderSearch.toLowerCase())||(st&&st.name.toLowerCase().includes(orderSearch.toLowerCase()));
  });

  const newOrders=allOrders.filter(o=>o.status==='new');
  const approvedOrders=allOrders.filter(o=>o.status==='approved');
  const sentOrders=allOrders.filter(o=>o.status==='sent');
  const doneOrders=allOrders.filter(o=>o.status==='done').slice(0,20);

  const isAdminOrManager=S.session.role==='admin'||S.session.role==='manager';

  return`<div>
  <div style="display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap;align-items:center">
    <input type="text" id="order-srch" placeholder="Zoek op # of winkel..." value="${S.orderSearch||''}" style="width:180px;height:30px;font-size:12px">
    <button class="btn bsm" onclick="showExportModal('allorders',null,'month')">📤 Export</button>
    ${isAdminOrManager?`<button class="btn bp bsm" id="add-order-btn">${l.newOrder}</button>`:''}
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px">
    
    <!-- Column 1: Nieuw -->
    <div class="panel">
      <div class="ph" style="background:rgba(60,52,137,0.08)">
        <span class="pht">🆕 Nieuw <span style="background:#3C3489;color:#fff;border-radius:10px;padding:0 6px;font-size:10px;margin-left:4px">${newOrders.length}</span></span>
      </div>
      <div style="padding:8px;display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto">
        ${newOrders.length?newOrders.map(o=>orderCard(o,'new',isAdminOrManager)).join(''):`<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:12px">Geen nieuwe orders</div>`}
      </div>
    </div>

    <!-- Column 2: Goedgekeurd / Planning -->
    <div class="panel">
      <div class="ph" style="background:rgba(12,92,138,0.08)">
        <span class="pht">📅 Planning <span style="background:#0C5C8A;color:#fff;border-radius:10px;padding:0 6px;font-size:10px;margin-left:4px">${approvedOrders.filter(o=>o.delivery_date).length}</span>${approvedOrders.filter(o=>!o.delivery_date).length?`<span style="background:#854F0B;color:#fff;border-radius:10px;padding:0 6px;font-size:10px;margin-left:4px">${approvedOrders.filter(o=>!o.delivery_date).length} ongepland</span>`:''}</span>
      </div>
      <div style="padding:8px">
        ${isAdminOrManager?bWeekPlanner(approvedOrders):`<div style="display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto">${approvedOrders.length?approvedOrders.map(o=>orderCard(o,'approved',false)).join(''):`<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:12px">Geen geplande orders</div>`}</div>`}
      </div>
    </div>

    <!-- Column 3: Onderweg -->
    <div class="panel">
      <div class="ph" style="background:rgba(8,80,65,0.08)">
        <span class="pht">🚚 Onderweg <span style="background:#085041;color:#fff;border-radius:10px;padding:0 6px;font-size:10px;margin-left:4px">${sentOrders.length}</span></span>
      </div>
      <div style="padding:8px;display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto">
        ${sentOrders.length?sentOrders.map(o=>orderCard(o,'sent',isAdminOrManager)).join(''):`<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:12px">Geen orders onderweg</div>`}
      </div>
    </div>

    <!-- Column 4: Geleverd -->
    <div class="panel">
      <div class="ph" style="background:rgba(39,80,10,0.08)">
        <span class="pht">✅ Geleverd <span style="background:#27500A;color:#fff;border-radius:10px;padding:0 6px;font-size:10px;margin-left:4px">${doneOrders.length}</span></span>
      </div>
      <div style="padding:8px;display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto">
        ${doneOrders.length?doneOrders.map(o=>orderCard(o,'done',isAdminOrManager)).join(''):`<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:12px">Nog niets geleverd</div>`}
      </div>
    </div>

  </div>
</div>`}

function orderCard(o, col, canEdit){
  const st=S.stores.find(x=>x.id===o.store_id);
  const items=(S.orderItems||[]).filter(i=>i.order_id===o.id);
  const itemsHtml=items.map(i=>{
      if(i.product_name)return`${i.product_name} ×${i.quantity}`;
      const p=S.products.find(x=>x.id===i.product_id);
      return p?`${p.name} ×${i.quantity}`:'';
    }).filter(Boolean).join(', ')||'—';
  const num=String(o.order_number||o.id).padStart(4,'0');
  const unread=(S.messages||[]).filter(m=>m.order_id===o.id&&m.from_account!=='admin'&&!m.is_read).length;
  const isBookmarked=o.bookmarked;
  const delivDate=o.delivery_date?new Date(o.delivery_date).toLocaleDateString(NL,{weekday:'short',day:'numeric',month:'short',timeZone:TZ}):'';

  return`<div style="background:var(--bg2);border-radius:var(--r1);padding:10px;border:0.5px solid var(--b3)${isBookmarked?';border-left:3px solid #F5C842':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div>
        <span style="font-weight:700;color:#D4537E">#${num}</span>
        <span style="font-weight:600;margin-left:6px">${st?st.name:'—'}</span>
        ${delivDate?`<div style="font-size:10px;color:#0C5C8A;margin-top:1px">📅 ${delivDate}</div>`:''}
      </div>
      <button class="btn bsm bookmark-btn" data-id="${o.id}" style="padding:2px 6px;font-size:13px;border:none;background:none;color:${isBookmarked?'#F5C842':'var(--t3)'}">${isBookmarked?'🔖':'🔖'}</button>
    </div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:6px">${itemsHtml}</div>
    ${o.note?`<div style="font-size:10px;color:var(--t3);margin-bottom:6px">📝 ${o.note}</div>`:''}
    <div style="display:flex;gap:4px;flex-wrap:wrap">

function bWeeklyRequests(){
  const weekStart=getWeekStart();
  const thisWeek=[...(S.weeklyRequests||[])].filter(r=>r.week_start===weekStart).sort((a,b)=>b.quantity-a.quantity);
  const maxQty=Math.max(1,...thisWeek.map(r=>r.quantity));
  const totalQty=thisWeek.reduce((a,r)=>a+r.quantity,0);
  const nextReset=getNextSunday();
  const now=new Date();
  const diff=nextReset-now;
  const days2=Math.floor(diff/(1000*60*60*24));
  const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const mins=Math.floor((diff%(1000*60*60))/(1000*60));
  const resetStr=days2>0?`${days2}d ${hours}u`:`${hours}u ${mins}m`;
  const colors=['#D4537E','#E07B39','#E0B939','#639922','#4A90D9','#9B59B6','#1ABC9C','#E74C3C','#F39C12','#2ECC71'];
  const size=180,cx=size/2,cy=size/2,r=75,innerR=40;
  let slices='',angle=-90;
  thisWeek.slice(0,10).forEach((item,i)=>{
    const pct=item.quantity/totalQty;
    const s2=angle*(Math.PI/180),e=angle+pct*360,eRad=e*(Math.PI/180);
    const x1=cx+r*Math.cos(s2),y1=cy+r*Math.sin(s2),x2=cx+r*Math.cos(eRad),y2=cy+r*Math.sin(eRad);
    const ix1=cx+innerR*Math.cos(s2),iy1=cy+innerR*Math.sin(s2),ix2=cx+innerR*Math.cos(eRad),iy2=cy+innerR*Math.sin(eRad);
    const large=pct>0.5?1:0,col=colors[i%colors.length];
    slices+=`<path d="M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${innerR},${innerR} 0 ${large},0 ${ix1},${iy1}" fill="${col}" stroke="var(--bg1)" stroke-width="1.5" opacity="0.9"/>`;
    angle=e;
  });
  return`<div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem">
    <div class="met"><div class="met-l">Producten</div><div class="met-v">${thisWeek.length}</div></div>
    <div class="met"><div class="met-l">Totaal stuks</div><div class="met-v">${totalQty}</div></div>
    <div class="met"><div class="met-l">Reset over</div><div class="met-v" style="font-size:15px">${resetStr}</div></div>
    <div class="met"><div class="met-l">Week van</div><div class="met-v" style="font-size:14px">${weekStart}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:${thisWeek.length?'220px 1fr':'1fr'};gap:12px;align-items:start">
    ${thisWeek.length?`<div class="panel" style="padding:1rem;display:flex;flex-direction:column;align-items:center">
      <div style="font-size:12px;font-weight:500;color:var(--t2);margin-bottom:10px">Verdeling</div>
      <svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${slices}<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="var(--t2)">${thisWeek.length} prod.</text></svg>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px;justify-content:center">
        ${thisWeek.slice(0,10).map((r2,i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px"><div style="width:8px;height:8px;border-radius:50%;background:${colors[i%colors.length]}"></div><span style="color:var(--t2)">${r2.product_name.slice(0,12)}${r2.product_name.length>12?'…':''}</span></div>`).join('')}
      </div>
    </div>`:''}
    <div class="panel">
      <div class="ph"><span class="pht">📈 Meest aangevraagd deze week</span><button class="btn bd bsm" onclick="resetWeeklyRequests()">🔄 Reset</button></div>
      <div class="tw"><table>
        <colgroup><col style="width:35px"><col style="width:160px"><col style="width:70px"><col style="width:70px"><col style="width:auto"></colgroup>
        <thead><tr><th>#</th><th>Product</th><th>SKU</th><th>Stuks</th><th>Grafiek</th></tr></thead>
        <tbody>${thisWeek.length?thisWeek.map((r2,i)=>{
          const pct=Math.round(r2.quantity/maxQty*100),col=colors[i%colors.length];
          return`<tr><td style="font-weight:700;color:${col}">${i+1}</td><td style="font-weight:500">${r2.product_name}</td><td style="color:var(--t2);font-size:11px">${r2.product_sku}</td><td><span style="font-size:16px;font-weight:700;color:${col}">${r2.quantity}</span></td><td><div class="barbg"><div class="barfill" style="width:${pct}%;background:${col}"></div></div></td></tr>`;
        }).join(''):`<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--t3)">Nog geen aanvragen deze week</td></tr>`}
        </tbody>
      </table></div>
    </div>
  </div>
</div>`}

function bWeekPlanner(approvedOrders){
  const days=['Ma','Di','Wo','Do','Vr','Za','Zo'];
  // Use Amsterdam timezone for all date calculations
  const todayStr=today(); // YYYY-MM-DD in Amsterdam time
  const todayNL=new Date(todayStr+'T00:00:00');
  
  // Week offset - 0 = current week, 1 = next week, etc.
  const weekOffset=S.plannerWeekOffset||0;
  
  // Calculate start of current week (Monday) based on Amsterdam date
  const currentMonday=new Date(todayNL);
  const dayOfWeek=todayNL.getDay()||7;
  currentMonday.setDate(todayNL.getDate()-dayOfWeek+1);
  currentMonday.setHours(0,0,0,0);
  
  // Apply offset
  const weekMonday=new Date(currentMonday);
  weekMonday.setDate(currentMonday.getDate()+weekOffset*7);
  
  const weekDates=days.map((_,i)=>{
    const d=new Date(weekMonday);
    d.setDate(weekMonday.getDate()+i);
    d.setHours(12,0,0,0); // Noon to avoid DST issues
    return d;
  });
  
  const allDates=[...weekDates];
  const allDayLabels=[...days];
  
  // Week label
  const weekStart=weekDates[0];
  const weekEnd=weekDates[6];
  const weekLabel=weekOffset===0?'Deze week':weekOffset===1?'Volgende week':
    weekOffset===-1?'Vorige week':
    `${weekStart.getDate()}/${weekStart.getMonth()+1} – ${weekEnd.getDate()}/${weekEnd.getMonth()+1}`;
  
  // Filter orders for this week's dates
  const weekDateStrs=weekDates.map(d=>d.toISOString().slice(0,10));
  const unplannedOrders=approvedOrders.filter(o=>!o.delivery_date);
  const thisWeekOrders=approvedOrders.filter(o=>weekDateStrs.includes(o.delivery_date));
  
  return`<div>
    <!-- Week navigator -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--bg2);border-radius:var(--r1);padding:8px 12px">
      <button class="btn bsm" onclick="S.plannerWeekOffset=(S.plannerWeekOffset||0)-1;render()" style="font-size:16px;padding:4px 10px">←</button>
      <div style="text-align:center">
        <div style="font-weight:600;font-size:14px">${weekLabel}</div>
        <div style="font-size:11px;color:var(--t2)">${fDate(weekStart)} – ${fDate(weekEnd)}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${weekOffset!==0?`<button class="btn bsm" onclick="S.plannerWeekOffset=0;render()" style="font-size:11px">Vandaag</button>`:''}
        <button class="btn bsm" onclick="S.plannerWeekOffset=(S.plannerWeekOffset||0)+1;render()" style="font-size:16px;padding:4px 10px">→</button>
      </div>
    </div>

    ${unplannedOrders.length?`
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--t2);margin-bottom:6px;font-weight:500">Niet ingepland (${unplannedOrders.length}):</div>
      ${unplannedOrders.map(o=>{
        const st=S.stores.find(x=>x.id===o.store_id);
        const num=String(o.order_number||o.id).padStart(4,'0');
        return`<div style="background:var(--bg2);border-radius:var(--r1);padding:8px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center">
          <span><strong style="color:#D4537E">#${num}</strong> ${st?st.name:'—'}</span>
          <select class="plan-date" data-id="${o.id}" style="height:28px;font-size:11px;width:130px">
            <option value="">Kies dag...</option>
            ${allDates.map((d,j)=>`<option value="${d.toISOString().slice(0,10)}">${allDayLabels[j]} ${d.getDate()}/${d.getMonth()+1}</option>`).join('')}
          </select>
        </div>`;
      }).join('')}
    </div>`:''}

    ${weekDates.map((d,i)=>{
      const dateStr=d.toISOString().slice(0,10);
      const dayOrders=approvedOrders.filter(o=>o.delivery_date===dateStr);
      const isToday=dateStr===todayStr;
      const isPast=dateStr<todayStr;
      return`<div style="margin-bottom:8px">
        <div style="font-size:11px;font-weight:600;color:${isToday?'#D4537E':isPast?'var(--t3)':'#0C5C8A'};margin-bottom:4px;padding:4px 8px;background:${isToday?'rgba(212,83,126,0.1)':isPast?'var(--bg2)':'rgba(12,92,138,0.08)'};border-radius:4px;display:flex;justify-content:space-between;align-items:center">
          <span>${days[i]} ${d.getDate()}/${d.getMonth()+1}${isToday?' (Vandaag)':''}</span>
          <span style="opacity:0.6">${dayOrders.length} order${dayOrders.length!==1?'s':''}</span>
        </div>
        ${dayOrders.length?dayOrders.map(o=>{
          const st=S.stores.find(x=>x.id===o.store_id);
          const num=String(o.order_number||o.id).padStart(4,'0');
          return`<div style="background:var(--bg2);border-radius:var(--r1);padding:8px 10px;margin-bottom:4px;font-size:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span><strong style="color:#D4537E">#${num}</strong> <span style="font-weight:500">${st?st.name:'—'}</span></span>
              <button class="btn bp bsm" style="background:#085041;font-size:10px" onclick="sendToDriver(${o.id})">🚚 Stuur</button>
            </div>
            <select class="plan-date" data-id="${o.id}" style="height:24px;font-size:10px;width:100%;color:var(--t2)">
              <option value="">📅 Verander dag...</option>
              ${allDates.map((d2,j)=>`<option value="${d2.toISOString().slice(0,10)}" ${d2.toISOString().slice(0,10)===dateStr?'selected':''}>${allDayLabels[j]} ${d2.getDate()}/${d2.getMonth()+1}</option>`).join('')}
            </select>
          </div>`;
        }).join(''):`<div style="padding:6px 8px;font-size:11px;color:var(--t3);font-style:italic">Geen orders gepland</div>`}
      </div>`;
    }).join('')}
  </div>`;
}

      <td><button class="btn bsm cchat" data-id="${c.id}">💬${(S.complaintMsgs||[]).filter(m=>m.complaint_id===c.id&&m.from_account==='admin'&&!m.is_read).length?` <span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 4px;font-size:10px">${(S.complaintMsgs||[]).filter(m=>m.complaint_id===c.id&&m.from_account==='admin'&&!m.is_read).length}</span>`:''}</button></td>
    </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;padding:1.5rem;color:var(--t3)">Geen klachten ingediend</td></tr>`}
    </tbody>
  </table></div>
</div>`}

function buildStoreView(){

  const maxQ=Math.max(1,...S.products.map(p=>qty(acc.store_id,p.id)));
  return`<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;flex-wrap:wrap;gap:10px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:42px;height:42px;background:#E6F1FB;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;color:#0C447C">${(store?.name||'W').slice(0,2).toUpperCase()}</div>
      <div>
        <div style="font-size:17px;font-weight:500">${store?.name||acc.display_name} <span class="badge bstr" style="margin-left:5px;vertical-align:middle">${l.storeRole}</span></div>

      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">${langBar()}<button class="btn bsm" onclick="toggleDarkMode()">${S.darkMode?'☀️':'🌙'}</button><button class="btn bsm" id="refresh-btn">↻</button><button class="btn bsm" id="logout-btn">${l.out}</button></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.1rem">
    <div class="met"><div class="met-l">${l.total}</div><div class="met-v">${storeTotal(acc.store_id)}</div></div>
    <div class="met"><div class="met-l">${l.inStock}</div><div class="met-v">${storeItems(acc.store_id)}</div></div>
    <div class="met"><div class="met-l" style="color:#854F0B">${l.attention}</div><div class="met-v" style="color:${AMBER}">${S.products.filter(p=>{const q=qty(acc.store_id,p.id);return p.min_stock>0&&(q===0||q<p.min_stock)}).length}</div></div>
    <div class="met"><div class="met-l" style="color:#3C3489">${l.openReqsS}</div><div class="met-v" style="color:#7F77DD">${myOrders.filter(o=>o.status!=='done').length}</div></div>
  </div>
  <div class="panel">
    <div class="ph"><span class="pht">${l.myStock} — ${store?.name}</span><button class="btn bp bsm" id="store-order-btn">+ ${l.addOrder}</button></div>
    <div class="tw"><table>
      <colgroup><col style="width:175px"><col style="width:95px"><col style="width:115px"><col style="width:60px"><col style="width:80px"><col style="width:90px"></colgroup>
      <thead><tr><th>${l.product}</th><th>${l.cat}</th><th>${l.stockTab}</th><th>${l.min}</th><th>${l.status}</th><th></th></tr></thead>
      <tbody>${(()=>{
        const storeObj=S.stores.find(s=>s.id===acc.store_id);
        const isOutlet=storeObj?.is_outlet===true;
        const isMagazijnStore=storeObj?.name?.includes('Magazijn');

        // Return products: OWN (for normal stores) + REJECT (for all stores)
        const returnNames=isOutlet?['REJECT']:['OWN','REJECT'];

        // Filter products based on store type
        // Magazijn: all products visible
        // Winkel: only products with for_type = 'winkel', 'both', or no for_type
        const visibleProds=isMagazijnStore
          ? S.products
          : S.products.filter(p=>!p.for_type||p.for_type==='winkel'||p.for_type==='both');

        // Regular products (exclude return products from main list)
        const regularProds=visibleProds.filter(p=>!returnNames.includes(p.name));
        const returnProds=visibleProds.filter(p=>returnNames.includes(p.name));

        const renderRow=(p)=>{
          const q=qty(acc.store_id,p.id),pct=Math.round(q/maxQ*100),c=barCol(q,p.min_stock);
          return`<tr>
            <td><div style="font-weight:500">${p.name}</div><div style="font-size:10px;color:var(--t3)">${p.sku}·${p.size}kg</div></td>
            <td>${p.category}</td>
            <td><div class="barcell"><span style="min-width:28px;font-weight:500;color:${p.min_stock>0&&q===0?RED:p.min_stock>0&&q<p.min_stock?AMBER:'var(--t1)'}">${q}</span><div class="barbg"><div class="barfill" style="width:${pct}%;background:${c}"></div></div></div></td>
            <td style="color:var(--t2)">${p.min_stock}</td>
            <td>${sbadge(q,p.min_stock)}</td>
            <td style="display:flex;gap:4px">
              <button class="btn bsm elk2" data-edit="${acc.store_id}-${p.id}">✏️</button>
              <button class="btn bsm rlk" data-req="${acc.store_id}-${p.id}">${l.reqBtn}</button>
            </td>
          </tr>`;
        };

        return regularProds.map(renderRow).join('')
          + (returnProds.length?`
            <tr><td colspan="6" style="padding:8px 0 4px;font-weight:700;font-size:11px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;border-top:2px solid var(--b2)">
              ${isOutlet?'Returns':'Returns (OWN & Reject)'}
            </td></tr>`:'')
          + returnProds.map(renderRow).join('');
      })()}</tbody>
    </table></div>
  </div>
  <div class="panel">
    <div class="ph"><span class="pht">${l.myOrders}</span></div>
    <div class="tw"><table>
      <colgroup><col style="width:45px"><col style="width:75px"><col style="width:65px"><col style="width:auto"><col style="width:80px"></colgroup>
      <thead><tr><th>#</th><th>${l.date}</th><th>${l.status}</th><th>${l.products}</th><th>💬</th></tr></thead>
      <tbody>${myOrders.length?myOrders.map(o=>{
        const items=(S.orderItems||[]).filter(i=>i.order_id===o.id);
        const itemsHtml=items.map(i=>{
      if(i.product_name)return`${i.product_name} ×${i.quantity}`;
      const p=S.products.find(x=>x.id===i.product_id);
      return p?`${p.name} ×${i.quantity}`:'';
    }).filter(Boolean).join(', ')||'—';
        const unread=(S.messages||[]).filter(m=>m.order_id===o.id&&m.from_account==='admin'&&!m.is_read).length;
        const orderNum=String(o.order_number||o.id).padStart(4,'0');
        return`<tr>
          <td style="font-weight:500;color:#D4537E">#${orderNum}</td>
          <td style="color:var(--t2)">${fDate(o.created_at)}</td>
          <td>${rbadge(o.status)}</td>
          <td style="font-size:11px">${itemsHtml}</td>
          <td><div style="display:flex;gap:3px;flex-wrap:wrap">
            ${o.status==='new'?`<button class="btn bsm eorder" data-id="${o.id}">${l.edit}</button>`:''}
            <button class="btn bsm chat-order" data-id="${o.id}">💬${unread?` <span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 4px;font-size:10px">${unread}</span>`:''}</button>
          </div></td>
        </tr>
        ${o.note?`<tr style="background:var(--bg2)"><td colspan="5" style="padding:3px 12px 8px;font-size:11px;color:var(--t2)">📝 <em>${o.note}</em></td></tr>`:''}`
      }).join(''):`<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--t3)">${l.noMyOrders}</td></tr>`}
      </tbody>
    </table></div>
  </div>
  <div class="panel">
    <div class="ph">
      <span class="pht">📋 Klachten</span>
      <button class="btn bp bsm" id="add-complaint-btn">+ Klacht indienen</button>
    </div>
    <div class="tw"><table>
      <colgroup><col style="width:88px"><col style="width:90px"><col style="width:150px"><col style="width:180px"><col style="width:70px"><col style="width:150px"></colgroup>
      <thead><tr><th>Datum</th><th>Type</th><th>Onderwerp</th><th>Omschrijving</th><th>Status</th><th>Chat</th></tr></thead>
      <tbody>${myComplaints.length?myComplaints.map(c=>`<tr>
        <td style="color:var(--t2)">${fDate(c.created_at)}</td>
        <td>${c.type==='website'?'🖥️ Website':c.type==='goods'?'📦 Goederen':'📝 Algemeen'}</td>
        <td style="font-weight:500">${c.subject}</td>
        <td style="font-size:11px;color:var(--t2)">${c.description}</td>
        <td>${c.status==='open'?'<span class="badge bnew">Open</span>':c.status==='in_progress'?'<span class="badge bsent">${t().inProgress}</span>':'<span class="badge bdone">Opgelost</span>'}</td>
        <td><button class="btn bsm cchat" data-id="${c.id}">💬${(S.complaintMsgs||[]).filter(m=>m.complaint_id===c.id&&m.from_account==='admin'&&!m.is_read).length?` <span style="background:#D4537E;color:#fff;border-radius:10px;padding:0 4px;font-size:10px">${(S.complaintMsgs||[]).filter(m=>m.complaint_id===c.id&&m.from_account==='admin'&&!m.is_read).length}</span>`:''}</button></td>
      </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;padding:1.5rem;color:var(--t3)">Geen klachten ingediend</td></tr>`}
      </tbody>
    </table></div>
  </div>
  ${S.modal?buildModal():''}
</div>`}

  if(m.type==='edit-stock'){inner=`<h3>${l.updateStock}</h3>
    <p style="font-size:12px;color:var(--t2);margin-bottom:.9rem">${m.pName} — ${m.sName}</p>
    ${S.session.role!=='admin'?`<div style="background:#FAEEDA;border:0.5px solid #FAC775;border-radius:var(--r1);padding:8px 10px;font-size:11px;color:#854F0B;margin-bottom:10px">⚠️ Pas de voorraad alleen aan als je stock hebt verbruikt of gecorrigeerd.</div>`:''}

      <div class="fr"><label>Categorie</label><select id="op-cat">${cats}</select></div>
      <div class="fr"><label>Eenheid</label><select id="op-unit">${units}</select></div>
      <div class="fr"><label>Std. bestelhoeveelheid</label><input type="number" id="op-dqty" value="${p.default_qty||1}" min="1"></div>
      <div class="fr"><label>Minimumvoorraad</label><input type="number" id="op-min" value="${p.min_stock||0}" min="0"></div>
      <div class="fr" style="grid-column:1/-1"><label>Leverancier</label><select id="op-sup"><option value="">— Geen —</option>${suppliers}</select></div>
      <div class="fr"><label>Actief</label><select id="op-active"><option value="true" ${p.active!==false?'selected':''}>Ja</option><option value="false" ${p.active===false?'selected':''}>Nee</option></select></div>
      <div class="fr"><label>Beschikbaar voor</label><select id="op-fortype">
        <option value="winkel" ${(!p.for_type||p.for_type==='winkel')?'selected':''}>🏪 Alleen winkels</option>
        <option value="magazijn" ${p.for_type==='magazijn'?'selected':''}>🏭 Alleen magazijnen</option>
        <option value="both" ${p.for_type==='both'?'selected':''}>🏪🏭 Winkels en magazijnen</option>
      </select></div>
    </div>
    <div class="fa"><button class="btn" id="mc">Annuleren</button><button class="btn bp" id="sop">Opslaan</button></div>`;}

  else if(m.type==='add-supplier'){
    inner=`<h3>Leverancier toevoegen</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fr"><label>Naam *</label><input type="text" id="sup-name" value=""></div>
      <div class="fr"><label>Categorie</label><input type="text" id="sup-cat" value=""></div>
      <div class="fr"><label>Contactpersoon</label><input type="text" id="sup-contact" value=""></div>

  else if(m.type==='add-order'||m.type==='edit-order'){

    const isAdminOrManager=S.session.role==='admin'||S.session.role==='manager';

    const o=m.order||null;
    const orderItems=isEdit?(S.orderItems||[]).filter(i=>i.order_id===o.id):[];
    const savedNote=m._savedNote!==undefined?m._savedNote:(isEdit?o.note||'':'');
    const sf=isStore?`<input type="hidden" id="m-store" value="${S.session.store_id}">`
      :`<div class="fr"><label>${l.store}</label><select id="m-store" onchange="S.modal._savedStore=this.value;S.modal.orderQtys={};S.modal.requestedProductIds=[];S.modal.removedProductIds=[];S.modal._savedNote=document.getElementById('m-note')?.value||'';render();bindModal()">${S.stores.map(s=>`<option value="${s.id}" ${(isEdit?o.store_id:m._savedStore?parseInt(m._savedStore)===s.id:m.storeId)==s.id?'selected':''}>${s.name.includes('Magazijn')?'🏭 ':'🏪 '}${s.name}</option>`).join('')}</select></div>`;
    
    // Determine selected store
    const selectedStoreId=isAdminOrManager
      ? (m._savedStore?parseInt(m._savedStore):S.stores[0]?.id)
      : S.session.store_id;
    const selectedStore=S.stores.find(s=>s.id===selectedStoreId);
    const isMagazijn=selectedStore?.name?.includes('Magazijn');

    // Product filter based on for_type field:
    // winkel → show for winkels
    // magazijn → show for magazijnen  
    // both → show for both
    const allOp=S.orderableProducts||[];
    const isOutlet=selectedStore?.is_outlet===true;
    const orderProds=isMagazijn
      ? allOp.filter(p=>p.for_type==='magazijn'||p.for_type==='both')
             .sort((a,b)=>a.name.localeCompare(b.name))
      : allOp.filter(p=>{
          if(p.for_type==='magazijn')return false;
          // OWN only for outlet stores
          if(p.name==='OWN'&&!isOutlet)return false;
          return true;
        }).sort((a,b)=>a.name.localeCompare(b.name));
    // Current order quantities
    const currentQtys=m.orderQtys||{};
    
    // Group by category
    const categories=[...new Set(orderProds.map(p=>p.category))];
    
    inner=`<h3>${isEdit?l.editOrder:l.addOrder}</h3>
    ${sf}
    <div style="display:grid;grid-template-columns:${isAdminOrManager?'minmax(0,1fr) 280px':'1fr'};gap:16px;min-width:600px">
      <!-- Product selector -->
      <div style="overflow-y:auto;max-height:60vh;padding-right:4px">
        ${categories.map(cat=>`
          <div style="margin-bottom:12px">
            <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:0.5px solid var(--b3)">${cat}</div>
            ${orderProds.filter(p=>p.category===cat).map(p=>{
              const qty=currentQtys[p.id]||0;
              return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r1);margin-bottom:4px;background:${qty>0?'rgba(99,153,34,0.08)':'var(--bg2)'};border:0.5px solid ${qty>0?'rgba(99,153,34,0.3)':'var(--b3)'};cursor:pointer" onclick="toggleOrderProduct(${p.id})">
                <span style="flex:1;font-size:13px;font-weight:${qty>0?'600':'400'};color:${qty>0?GREEN:'var(--t1)'}">${p.name}${p.name==='PRICE CARDS'?' 📋':''}</span>
                ${isAdminOrManager?`<div style="display:flex;align-items:center;gap:4px" onclick="event.stopPropagation()">
                  <button type="button" class="qty-minus" data-pid="${p.id}" style="width:26px;height:26px;border-radius:50%;border:0.5px solid var(--b2);background:var(--bg1);cursor:pointer;font-size:16px">−</button>
                  <span style="min-width:28px;text-align:center;font-weight:700;font-size:15px">${qty||0}</span>
                  <button type="button" class="qty-plus" data-pid="${p.id}" style="width:26px;height:26px;border-radius:50%;background:${PINK};color:#fff;border:none;cursor:pointer;font-size:16px">+</button>
                </div>`:`<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:${qty>0?'rgba(99,153,34,0.15)':'rgba(0,0,0,0.05)'};color:${qty>0?GREEN:'var(--t3)'}">${qty>0?'✓ Aangevraagd':'+ Aanvragen'}</span>`}
              </div>`;
            }).join('')}
          </div>`).join('')}
      </div>
      
      <!-- Shopping list - only for admin/manager -->
      ${S.session.role!=='store'?`<div style="background:var(--bg2);border-radius:var(--r1);padding:10px;overflow-y:auto;max-height:60vh">
        <div style="font-size:11px;font-weight:700;color:var(--t2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">🛒 Boodschappenlijst</div>
        <div class="shopping-list-items">
        ${(()=>{
          const reqIds=m.requestedProductIds||Object.keys(currentQtys).filter(k=>currentQtys[k]>0).map(Number);
          const removedIds=m.removedProductIds||[];
          const reqProds=orderProds.filter(p=>reqIds.includes(p.id));
          if(reqProds.length===0)return'<div style="text-align:center;color:var(--t3);font-size:12px;padding:1rem">Nog geen aanvragen</div>';
          return reqProds.map(p=>{
            const isRemoved=removedIds.includes(p.id);
            const qty=currentQtys[p.id]||0;
            return`<div data-list-pid="${p.id}" style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:${isRemoved?'rgba(226,75,74,0.08)':'rgba(99,153,34,0.08)'};border:0.5px solid ${isRemoved?'rgba(226,75,74,0.3)':'rgba(99,153,34,0.25)'}">
              <span style="font-size:13px;font-weight:600;color:${isRemoved?RED:GREEN};${isRemoved?'text-decoration:line-through':''}">${isRemoved?'✗':'✓'} ${p.name}</span>
              <div style="display:flex;align-items:center;gap:6px">
                ${!isRemoved?`<span style="font-size:12px;font-weight:700;color:${GREEN}">×${qty}</span>`:''}

              </div>
            </div>`;
          }).join('');
        })()}

        <div style="margin-top:10px;padding-top:8px;border-top:0.5px solid var(--b3);font-size:12px;color:var(--t2)">
          Totaal: <strong id="order-totaal" style="color:var(--t1)">${Object.values(currentQtys).filter(v=>v>0).length} producten</strong>
        </div>
      </div>`:''}
    </div>
    
    <div id="price-cards-section" style="display:${m.showPriceCards?'block':'none'};margin-top:10px;padding:10px;background:rgba(245,200,66,0.1);border:0.5px solid rgba(245,200,66,0.4);border-radius:var(--r1)">
      <div style="font-size:12px;font-weight:600;margin-bottom:8px">📋 Price Cards specificatie</div>
      <textarea id="price-cards-note" style="height:60px;font-size:12px" placeholder="Specificeer de price cards (bijv. €5, €10, €15...)...">${m.priceCardsNote||''}</textarea>
    </div>
    
    <div class="fr" style="margin-top:10px"><label>${l.note}</label><textarea id="m-note">${savedNote}</textarea></div>
    <div class="fa"><button class="btn" id="mc">${l.cancel}</button><button class="btn bp" id="sorder">${isEdit?l.save:l.submit}</button></div>`;}

  else if(m.type==='chat'){
    const o=S.orders.find(x=>x.id===m.orderId);
    const st=S.stores.find(x=>x.id===o?.store_id);

async function doLogin(){
  const l=t(),u=gv('lu'),p=gv('lp');
  if(!u||!p){S.loginErr=l.loginErr;render();return;}
  
  // First try Supabase Auth (email-based)
  // Build email from username: username@company.handle.nl
  const email=u.includes('@')?u.toLowerCase():`${u.toLowerCase()}@${S.company?.handle||'rejoes'}.nl`;
  
  try{
    const authData=await authLogin(email, p);
    S.accessToken=authData.access_token;
    
    // Find matching account by auth_id
    const authUser=authData.user;
    let acc=S.accounts.find(x=>x.auth_id===authUser.id);
    
    // Fallback: find by username (for accounts not yet linked)
    if(!acc) acc=S.accounts.find(x=>x.username===u);
    
    if(acc){
      S.session=acc;
      saveSession({...acc, _accessToken: authData.access_token});
      localStorage.setItem('appCompany',JSON.stringify(S.company));
      S.screen='app';S.loginErr='';render();
      
      // Log attendance for store accounts
      if(acc.role==='store'&&acc.store_id){
        const todayStr=today();
        const alreadyLogged=S.attendance&&S.attendance.some(a=>a.account_id===acc.id&&a.login_date===todayStr);
        if(!alreadyLogged){
          api('attendance',{method:'POST',body:JSON.stringify({account_id:acc.id,store_id:acc.store_id,company_id:S.company?.id,login_date:todayStr})})
            .then(res=>{if(res&&res[0])S.attendance=[res[0],...(S.attendance||[])]})
            .catch(()=>{});
        }
      }
      if(acc.role==='admin'){
        setTimeout(()=>{lastOrderCount=S.orders.length;lastMsgCount=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;startPolling();requestNotificationPermission();
        requestPushPermission();
        setTimeout(initFirebase, 1500);},2000);
      }
    }else{
      S.loginErr=l.loginErr;S.loginUser=u;S.loginPass=p;render();
    }
  }catch(e){
    // Fallback to old password check for accounts not yet in Supabase Auth
    const acc=S.accounts.find(x=>x.username===u&&x.password===p);
    if(acc){
      S.session=acc;
      saveSession(acc);
      localStorage.setItem('appCompany',JSON.stringify(S.company));
      S.screen='app';S.loginErr='';render();
      if(acc.role==='store'&&acc.store_id){
        const todayStr=today();
        const alreadyLogged=S.attendance&&S.attendance.some(a=>a.account_id===acc.id&&a.login_date===todayStr);
        if(!alreadyLogged){
          api('attendance',{method:'POST',body:JSON.stringify({account_id:acc.id,store_id:acc.store_id,company_id:S.company?.id,login_date:todayStr})})
            .then(res=>{if(res&&res[0])S.attendance=[res[0],...(S.attendance||[])]})
            .catch(()=>{});
        }
      }
      if(acc.role==='admin'){
        setTimeout(()=>{lastOrderCount=S.orders.length;lastMsgCount=(S.messages||[]).filter(m=>m.from_account!=='admin'&&!m.is_read).length;startPolling();requestNotificationPermission();
        requestPushPermission();
        setTimeout(initFirebase, 1500);},2000);
      }
    }else{
      S.loginErr=l.loginErr;S.loginUser=u;S.loginPass=p;render();
    }
  }
}

function filterByPeriod(items, dateField, period) {
  const now = new Date();
  const start = new Date();
  if (period === 'day') start.setHours(0,0,0,0);
  else if (period === 'week') { start.setDate(now.getDate() - now.getDay()); start.setHours(0,0,0,0); }
  else if (period === 'month') start.setDate(1), start.setHours(0,0,0,0);
  else if (period === 'year') { start.setMonth(0,1); start.setHours(0,0,0,0); }
  else return items; // 'all'
  return items.filter(item => new Date(item[dateField]) >= start);
}

function exportToExcel(sheets, filename) {
  const wb = XLSX.utils.book_new();
  sheets.forEach(({name, data}) => {
    const ws = XLSX.utils.aoa_to_sheet(data);
    // Style header row
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let C = range.s.c; C <= range.e.c; C++) {
      const cell = ws[XLSX.utils.encode_cell({r:0, c:C})];
      if(cell) cell.s = {font:{bold:true}, fill:{fgColor:{rgb:'D4537E'}}};
    }
    XLSX.utils.book_append_sheet(wb, ws, name.substring(0,31));
  });
  XLSX.writeFile(wb, filename+'.xlsx');
}

function exportToPDF(title, columns, rows, filename) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation: rows.length > 5 ? 'landscape' : 'portrait'});
  
  // Header
  doc.setFillColor(212, 83, 126);
  doc.rect(0, 0, doc.internal.pageSize.width, 20, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text(title, 14, 13);
  doc.setFontSize(9);
  doc.text(new Date().toLocaleDateString(NL,{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:TZ}), doc.internal.pageSize.width - 14, 13, {align:'right'});
  
  // Company name
  if(S.company) {
    doc.setFontSize(10);
    doc.text(S.company.name, 14, 18);
  }

  doc.autoTable({
    head: [columns],
    body: rows,
    startY: 25,
    styles: {fontSize: 9, cellPadding: 3},
    headStyles: {fillColor: [212, 83, 126], textColor: 255, fontStyle: 'bold'},
    alternateRowStyles: {fillColor: [245, 245, 243]},
    margin: {left: 14, right: 14},
  });
  
  doc.save(filename+'.pdf');
}

// Export orders

  let orders = orderId ? S.orders.filter(o=>o.id===orderId) : filterByPeriod(S.orders, 'created_at', period);

  if(S.exportFormat==='excel') {
    exportToExcel([{name:'Orders', data:[cols,...rows]}], filename);
  } else {

  }

function getWeekStart(){
  const now=new Date();
  const day=now.getDay(); // 0=Sunday
  const diff=now.getDate()-day+(day===0?-6:1); // Monday
  const monday=new Date(now.setDate(diff));
  return monday.toISOString().slice(0,10);
}

function getNextSunday(){
  const now=new Date();
  const day=now.getDay();
  const diff=day===0?0:7-day;
  const sunday=new Date();
  sunday.setDate(now.getDate()+diff);
  sunday.setHours(23,59,0,0);
  return sunday;
}

async function checkWeeklyReset(){
  // Check if it's Sunday after 23:59 and reset if needed
  const now=new Date();
  if(now.getDay()===0){ // Sunday
    const hours=now.getHours();
    const mins=now.getMinutes();
    if(hours===23&&mins>=59){
      // Reset all weekly requests
      try{
        const ids=(S.weeklyRequests||[]).map(r=>r.id);
        if(ids.length>0){
          await api(`weekly_product_requests?id=in.(${ids.join(',')})`,{method:'DELETE',headers:{}});
        }
        S.weeklyRequests=[];
        showToast('✓ Wekelijkse statistieken gereset');
      }catch(e){}
    }
  }
}

async function logWeeklyRequest(orderItems){
  const weekStart=getWeekStart();
  for(const item of orderItems){
    const productName=item.product_name||(S.products.find(x=>x.id===item.product_id)?.name)||'';
    const productSku=item.orderable_product_id?'ORD-'+item.orderable_product_id:(S.products.find(x=>x.id===item.product_id)?.sku)||'';
    const opid=item.orderable_product_id||item.product_id;
    if(!productName)continue;
    const existing=(S.weeklyRequests||[]).find(r=>r.product_id===opid&&r.week_start===weekStart);
    try{
      if(existing){
        const newQty=existing.quantity+item.quantity;
        await api(`weekly_product_requests?id=eq.${existing.id}`,{method:'PATCH',body:JSON.stringify({quantity:newQty})});
        existing.quantity=newQty;
      }else{
        const[nr]=await api('weekly_product_requests',{method:'POST',body:JSON.stringify({product_id:opid,product_name:productName,product_sku:productSku,quantity:item.quantity,week_start:weekStart})});
        if(nr)(S.weeklyRequests=S.weeklyRequests||[]).push(nr);
      }
    }catch(e){}
  }
}

function rebuildShoppingList(){
  const listContainer=document.querySelector('.shopping-list-items');
  if(!listContainer)return;
  
  const qtys=S.modal.orderQtys||{};
  const removedIds=S.modal.removedProductIds||[];
  // Use all products for admin/manager, orderable products for stores
  const isAdminOrder=S.modal.isAdminOrder||(S.session.role==='admin'||S.session.role==='manager');
  const orderProds=isAdminOrder?[...S.products].sort((a,b)=>a.name.localeCompare(b.name)):(S.orderableProducts||[]);
  
  // All products that are either requested OR added by admin (qty>0) OR on removed list
  const reqIds=S.modal.requestedProductIds||[];
  const addedByAdmin=Object.keys(qtys).filter(k=>qtys[k]>0&&!reqIds.includes(parseInt(k))).map(Number);
  const allListIds=[...new Set([...reqIds,...addedByAdmin,...removedIds])];
  const listProds=orderProds.filter(p=>allListIds.includes(p.id));
  
  if(listProds.length===0){
    listContainer.innerHTML='<div style="text-align:center;color:var(--t3);font-size:12px;padding:1rem">Nog geen aanvragen</div>';
    return;
  }
  
  listContainer.innerHTML=listProds.map(p=>{
    const isRemoved=removedIds.includes(p.id);
    const qty=qtys[p.id]||0;
    const isAdminAdded=!reqIds.includes(p.id)&&qty>0;
    return`<div data-list-pid="${p.id}" style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:8px;margin-bottom:5px;background:${isRemoved?'rgba(226,75,74,0.08)':'rgba(99,153,34,0.08)'};border:0.5px solid ${isRemoved?'rgba(226,75,74,0.3)':'rgba(99,153,34,0.25)'}">
      <span style="font-size:13px;font-weight:600;color:${isRemoved?'#E24B4A':'#639922'};${isRemoved?'text-decoration:line-through':''}">${isRemoved?'✗':'✓'} ${p.name}${isAdminAdded?' <span style="font-size:10px;opacity:0.6">(+admin)</span>':''}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${!isRemoved?`<span style="font-size:12px;font-weight:700;color:#639922">×${qty}</span>`:''}
        <button type="button" onclick="toggleShoppingListItem(${p.id})" style="width:20px;height:20px;border-radius:50%;border:none;background:${isRemoved?'rgba(99,153,34,0.2)':'rgba(226,75,74,0.2)'};color:${isRemoved?'#639922':'#E24B4A'};cursor:pointer;font-size:12px;line-height:1">${isRemoved?'↩':'✕'}</button>
      </div>
    </div>`;
  }).join('');
}

function toggleShoppingListItem(pid){
  if(!S.modal.removedProductIds)S.modal.removedProductIds=[];
  const idx=S.modal.removedProductIds.indexOf(pid);
  if(idx>-1){
    // Restore - remove from removed list
    S.modal.removedProductIds.splice(idx,1);
    // Restore qty to 1 if it was 0
    if(!S.modal.orderQtys[pid]||S.modal.orderQtys[pid]===0){
      S.modal.orderQtys[pid]=1;
    }
  }else{
    // Remove - add to removed list and set qty to 0
    S.modal.removedProductIds.push(pid);
    S.modal.orderQtys[pid]=0;
  }
  // Update shopping list item DOM directly
  const item=document.querySelector(`[data-list-pid="${pid}"]`);
  const isRemoved=S.modal.removedProductIds.includes(pid);
  if(item){
    item.style.background=isRemoved?'rgba(226,75,74,0.08)':'rgba(99,153,34,0.08)';
    item.style.borderColor=isRemoved?'rgba(226,75,74,0.3)':'rgba(99,153,34,0.25)';
    const nameSpan=item.querySelector('span:first-child');
    if(nameSpan){
      nameSpan.style.color=isRemoved?'#E24B4A':'#639922';
      nameSpan.style.textDecoration=isRemoved?'line-through':'none';
      nameSpan.textContent=(isRemoved?'✗ ':'✓ ')+(S.orderableProducts||[]).find(p=>p.id===pid)?.name||'';
    }
    const btn=item.querySelector('button');
    if(btn){
      btn.style.background=isRemoved?'rgba(99,153,34,0.2)':'rgba(226,75,74,0.2)';
      btn.style.color=isRemoved?'#639922':'#E24B4A';
      btn.textContent=isRemoved?'↩':'✕';
    }
    // Show/hide qty
    const qtySpan=item.querySelectorAll('span')[1];
    if(qtySpan)qtySpan.style.display=isRemoved?'none':'inline';
  }
  // Rebuild entire shopping list to keep it consistent
  rebuildShoppingList();
  // Also update product row on left side
  const row=document.querySelector(`[onclick="toggleOrderProduct(${pid})"]`);
  if(row){
    const qty=S.modal.orderQtys[pid]||0;
    row.style.background=qty>0?'rgba(99,153,34,0.08)':'var(--bg2)';
    row.style.borderColor=qty>0?'rgba(99,153,34,0.3)':'var(--b3)';
  }
}

function toggleOrderProduct(pid){
  if(!S.modal.orderQtys)S.modal.orderQtys={};
  const current=S.modal.orderQtys[pid]||0;
  const newVal=current>0?0:1;
  S.modal.orderQtys[pid]=newVal;
  
  // Update DOM directly - no full render needed
  const row=document.querySelector(`[onclick="toggleOrderProduct(${pid})"]`);
  if(row){
    const badge=row.querySelector('span:last-child');
    if(badge){
      badge.textContent=newVal>0?'✓ Aangevraagd':'+ Aanvragen';
      badge.style.background=newVal>0?'rgba(99,153,34,0.15)':'rgba(0,0,0,0.05)';

    row.style.borderColor=newVal>0?'rgba(99,153,34,0.3)':'var(--b3)';

    if(nameSpan){
      nameSpan.style.fontWeight=newVal>0?'600':'400';
      nameSpan.style.color=newVal>0?'#639922':'var(--t1)';
    }

  // Update shopping list item if visible
  const listItems=document.querySelectorAll(`[data-list-pid="${pid}"]`);
  listItems.forEach(item=>{
    item.style.opacity=newVal>0?'1':'0.4';

    if(check)check.textContent=newVal>0?'✓':'✗';
  });

  // Update totaal
  const totaal=document.getElementById('order-totaal');
  if(totaal){
    const total=Object.values(S.modal.orderQtys).reduce((a,b)=>a+b,0);
    totaal.textContent=total+' producten';

  const prod=(S.orderableProducts||[]).find(p=>p.id===pid);

    S.modal.showPriceCards=newVal>0;
    const pcSection=document.getElementById('price-cards-section');

      S.modal._savedStore=document.getElementById('m-store')?.value||null;
      render();bindModal();
      requestAnimationFrame(()=>window.scrollTo(0,scrollY));
    }
  }
}

async function lookupCompany(handle){

  try{
    const results=await api(`companies?handle=eq.${handle.trim().toLowerCase()}`);
    if(results&&results.length>0){
      S.company=results[0];
      S.handleErr='';
      S.screen='login';
      // Check for saved session for this company
      const saved=getSavedSession();
      if(saved&&saved.company_id===S.company.id){S.session=saved;}
      render();
      loadAll();
    }else{
      S.handleErr=`Bedrijf "${handle}" niet gevonden.`;
      render();
    }
  }catch(e){S.handleErr='Fout bij zoeken. Probeer opnieuw.';render();}
}

  if(dep)dep.addEventListener('click',()=>{
    const exp=S.exportPage||{type:'orders',format:'excel',period:'month',storeId:'all',status:'all'};
    S.exportFormat=exp.format;
    if(exp.type==='orders'){
      // Filter orders
      let items=filterByPeriod([...S.orders],'created_at',exp.period);
      if(exp.storeId!=='all') items=items.filter(o=>o.store_id===parseInt(exp.storeId));
      if(exp.status!=='all') items=items.filter(o=>o.status===exp.status);
      const period={day:t().today,week:t().periodLabel_week,month:t().periodLabel_month,year:t().periodLabel_year,all:t().allTime}[exp.period];
      const storeName=exp.storeId==='all'?'Alle':(S.stores.find(s=>s.id==exp.storeId)?.name||'');
      const filename=`Orders_${storeName}_${period}_${today()}`;
      const cols=['Order #','Datum','Winkel','Producten','Notitie','Status'];
      const rows=items.map(o=>{
        const st=S.stores.find(x=>x.id===o.store_id);

      });

      else{exportToPDF(`Orders — ${storeName} — ${period}`,cols,rows,filename);}
